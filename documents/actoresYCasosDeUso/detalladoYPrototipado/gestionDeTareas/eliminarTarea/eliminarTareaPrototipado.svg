<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <rect x="0" y="0" width="1000" height="700" fill="#ffffff"/>
  <!-- outer frame -->
  <rect x="20" y="20" width="960" height="660" rx="6" ry="6" fill="none" stroke="#000" stroke-width="3"/>
  <text x="38" y="80" font-family="Comic Sans MS, Comic Sans, cursive" font-size="38" fill="#000">eliminarTarea()</text>

  <!-- modal -->
  <rect x="240.0" y="170.0" width="520" height="320" rx="10" ry="10" fill="#fff" stroke="#000" stroke-width="3"/>
  <!-- header -->
  <line x1="240.0" y1="240.0" x2="760.0" y2="240.0" stroke="#000" stroke-width="2"/>
  <text x="500.0" y="218.0" text-anchor="middle" font-family="Comic Sans MS, Comic Sans, cursive" font-size="46" fill="#000">Eliminar Tarea</text>
  <text x="738.0" y="218.0" text-anchor="end" font-family="Comic Sans MS, Comic Sans, cursive" font-size="30" fill="#000">×</text>

  <!-- body text -->
  <text x="500.0" y="318.0" text-anchor="middle" font-family="Comic Sans MS, Comic Sans, cursive" font-size="22" fill="#000">¿Seguro que deseas eliminar esta tarea?</text>
  <text x="500.0" y="354.0" text-anchor="middle" font-family="Comic Sans MS, Comic Sans, cursive" font-size="22" fill="#000">Esta acción no se puede deshacer.</text>

  <!-- buttons -->
  <rect x="285.0" y="408.0" width="160" height="52" rx="12" ry="12" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="365.0" y="442.0" text-anchor="middle" font-family="Comic Sans MS, Comic Sans, cursive" font-size="20" fill="#000">Cancelar</text>

  <rect x="485.0" y="408.0" width="230" height="52" rx="12" ry="12" fill="#e65b5b" stroke="#000" stroke-width="3"/>
  <text x="600.0" y="442.0" text-anchor="middle" font-family="Comic Sans MS, Comic Sans, cursive" font-size="20" fill="#ffffff">Confirmar eliminación</text>
</svg>

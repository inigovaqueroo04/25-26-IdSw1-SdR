<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS","Segoe UI",Arial,sans-serif; fill:#111; }
      .section { font-size: 32px; font-weight: 700; }
      .title { font-size: 56px; font-weight: 700; }
      .label { font-size: 28px; font-weight: 700; }
      .item { font-size: 22px; }
      .muted { fill:#777; }
      .outline { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke-width:2; }
      .input { fill:#fff; stroke:#111; stroke-width:3; rx:14; ry:14; }
      .btn { fill:#fff; stroke:#111; stroke-width:3; rx:20; ry:20; }
      .scrollTrack { fill:#fff; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .scrollThumb { fill:#f3f3f3; stroke:#111; stroke-width:2; rx:10; ry:10; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="760" fill="white"/>
  <rect x="8" y="8" width="1084" height="744" class="outline"/>

  <text x="30" y="70" class="hand section">crearTarea()</text>

  <!-- Modal -->
  <rect x="90" y="110" width="920" height="560" class="outline"/>
  <line x1="90" y1="200" x2="1010" y2="200" class="outline thin"/>

  <text x="550" y="175" text-anchor="middle" class="hand title">Crear Tarea</text>
  <text x="975" y="175" class="hand section">×</text>

  <!-- Scrollbar inside modal -->
  <rect x="975" y="225" width="18" height="420" class="scrollTrack"/>
  <rect x="977" y="315" width="14" height="120" class="scrollThumb"/>

  <!-- Fields -->
  <text x="170" y="255" class="hand label">Código / ID</text>
  <rect x="170" y="275" width="760" height="60" class="input"/>
  <text x="195" y="315" class="hand item muted">Ej: T-004</text>

  <text x="170" y="385" class="hand label">Título</text>
  <rect x="170" y="405" width="760" height="60" class="input"/>
  <text x="195" y="445" class="hand item muted">Ej: Comprar pan</text>

  <text x="170" y="515" class="hand label">Descripción</text>
  <rect x="170" y="535" width="760" height="120" class="input"/>
  <text x="195" y="580" class="hand item muted">Detalles de la tarea...</text>

  <!-- Buttons -->
  <rect x="210" y="615" width="260" height="70" class="btn"/>
  <text x="340" y="660" text-anchor="middle" class="hand label">Cancelar</text>

  <rect x="650" y="615" width="280" height="70" class="btn"/>
  <text x="790" y="660" text-anchor="middle" class="hand label">Crear tarea</text>

</svg>

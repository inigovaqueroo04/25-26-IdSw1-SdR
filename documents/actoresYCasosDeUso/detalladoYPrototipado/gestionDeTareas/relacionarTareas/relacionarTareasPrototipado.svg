<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" viewBox="0 0 900 600"
     xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: white; stroke: black; stroke-width: 3; }
    .title { font-family: 'Comic Sans MS', 'Comic Sans', cursive; font-size: 40px; font-weight: bold; }
    .label { font-family: 'Comic Sans MS', 'Comic Sans', cursive; font-size: 22px; }
    .input { fill: white; stroke: black; stroke-width: 2; }
    .btn { fill: white; stroke: black; stroke-width: 2; }
    .btn-danger { fill: #e85b5b; stroke: black; stroke-width: 2; }
  </style>

  <!-- Outer frame -->
  <rect x="20" y="20" width="860" height="560" class="box"/>
  <text x="40" y="55" class="label">relacionarTareas()</text>

  <!-- Modal -->
  <rect x="170" y="110" rx="12" ry="12" width="560" height="380" class="box"/>
  <line x1="170" y1="170" x2="730" y2="170" stroke="black" stroke-width="2"/>

  <text x="450" y="155" text-anchor="middle" class="title">Relacionar Tareas</text>
  <text x="705" y="150" class="label">×</text>

  <!-- Selected task -->
  <text x="200" y="205" class="label">Tarea seleccionada</text>
  <rect x="200" y="215" rx="10" ry="10" width="500" height="45" class="input"/>
  <text x="215" y="245" class="label">T-003 · Pagar facturas</text>

  <!-- Task to relate -->
  <text x="200" y="295" class="label">Tarea a relacionar (ID / título)</text>
  <rect x="200" y="305" rx="10" ry="10" width="500" height="45" class="input"/>
  <text x="215" y="335" class="label">Ej: T-010 o "Comprar comida"</text>

  <!-- Relation type -->
  <text x="200" y="385" class="label">Tipo de relación</text>
  <rect x="200" y="395" rx="10" ry="10" width="300" height="45" class="input"/>
  <text x="215" y="425" class="label">Predecesora ▾</text>

  <!-- Buttons -->
  <rect x="260" y="460" rx="18" ry="18" width="160" height="50" class="btn"/>
  <text x="340" y="493" text-anchor="middle" class="label">Cancelar</text>

  <rect x="450" y="460" rx="18" ry="18" width="250" height="50" class="btn-danger"/>
  <text x="575" y="493" text-anchor="middle" class="label" fill="white">Establecer relación</text>
</svg>

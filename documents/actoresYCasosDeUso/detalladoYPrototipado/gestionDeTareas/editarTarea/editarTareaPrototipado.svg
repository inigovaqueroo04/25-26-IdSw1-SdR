<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS","Segoe UI",Arial,sans-serif; fill:#111; }
      .h1 { font-size: 56px; font-weight: 700; }
      .h2 { font-size: 34px; font-weight: 700; }
      .lbl { font-size: 26px; font-weight: 700; }
      .txt { font-size: 22px; }
      .muted { fill:#777; }
      .outline { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke-width:2; }
      .input { fill:#fff; stroke:#111; stroke-width:3; rx:14; ry:14; }
      .area { fill:#fff; stroke:#111; stroke-width:3; rx:14; ry:14; }
      .btn { fill:#fff; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .btnDanger { fill:#fff; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .btnPrimary { fill:#e85a5a; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .chip { fill:#fff; stroke:#111; stroke-width:2; rx:14; ry:14; }
      .track { fill:#fff; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .thumb { fill:#f3f3f3; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .divider { stroke:#111; stroke-width:2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="820" fill="white"/>
  <rect x="8" y="8" width="1184" height="804" class="outline"/>

  <text x="28" y="70" class="hand h2">editarTarea()</text>

  <!-- Modal container -->
  <rect x="90" y="110" width="1020" height="620" class="outline"/>
  <line x1="90" y1="200" x2="1110" y2="200" class="divider"/>

  <text x="600" y="175" text-anchor="middle" class="hand h1">Editar Tarea</text>
  <text x="1078" y="175" class="hand h2">×</text>

  <!-- Scrollbar -->
  <rect x="1082" y="225" width="18" height="480" class="track"/>
  <rect x="1084" y="320" width="14" height="140" class="thumb"/>

  <!-- Left column fields -->
  <text x="140" y="255" class="hand lbl">Código / ID</text>
  <rect x="140" y="275" width="420" height="56" class="input"/>
  <text x="162" y="312" class="hand txt muted">Ej: T-001</text>

  <text x="140" y="368" class="hand lbl">Título</text>
  <rect x="140" y="388" width="420" height="56" class="input"/>
  <text x="162" y="425" class="hand txt muted">Ej: Comprar comida</text>

  <text x="140" y="482" class="hand lbl">Descripción</text>
  <rect x="140" y="502" width="420" height="120" class="area"/>
  <text x="162" y="548" class="hand txt muted">Detalles de la tarea...</text>

  <!-- Right column: options / related data -->
  <text x="600" y="255" class="hand lbl">Usuarios asignados</text>
  <rect x="600" y="275" width="440" height="56" class="input"/>
  <rect x="615" y="287" width="140" height="32" class="chip"/>
  <text x="685" y="310" text-anchor="middle" class="hand txt">Usuario A</text>
  <rect x="765" y="287" width="140" height="32" class="chip"/>
  <text x="835" y="310" text-anchor="middle" class="hand txt">Usuario B</text>
  <rect x="915" y="287" width="110" height="32" class="chip"/>
  <text x="970" y="310" text-anchor="middle" class="hand txt">+ Añadir</text>

  <text x="600" y="368" class="hand lbl">Horario</text>
  <rect x="600" y="388" width="440" height="56" class="input"/>
  <text x="622" y="425" class="hand txt muted">Ej: Vie 18:00 - 19:00</text>

  <text x="600" y="482" class="hand lbl">Localización</text>
  <rect x="600" y="502" width="440" height="56" class="input"/>
  <text x="622" y="539" class="hand txt muted">Ej: Casa / Supermercado</text>

  <text x="600" y="596" class="hand lbl">Recordatorios</text>
  <rect x="600" y="616" width="440" height="56" class="input"/>
  <text x="622" y="653" class="hand txt muted">Ej: 1h antes (notificación)</text>

  <!-- Footer buttons -->
  <rect x="140" y="650" width="240" height="70" class="btn"/>
  <text x="260" y="695" text-anchor="middle" class="hand lbl">Volver atrás</text>

  <rect x="410" y="650" width="260" height="70" class="btnDanger"/>
  <text x="540" y="695" text-anchor="middle" class="hand lbl">Cancelar</text>

  <rect x="820" y="650" width="220" height="70" class="btnPrimary"/>
  <text x="930" y="695" text-anchor="middle" class="hand lbl" fill="#fff">Guardar</text>

</svg>

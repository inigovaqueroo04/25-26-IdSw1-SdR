<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <rect x="10" y="10" width="980" height="580" rx="10" ry="10"
        fill="white" stroke="black" stroke-width="3"/>

  <!-- Function label -->
  <text x="40" y="60" font-size="28" font-family="Arial" fill="black">marcarCompletada()</text>

  <!-- Modal container -->
  <rect x="300" y="170" width="400" height="260" rx="12" ry="12"
        fill="white" stroke="black" stroke-width="3"/>

  <!-- Modal header -->
  <rect x="300" y="170" width="400" height="60" rx="12" ry="12"
        fill="white" stroke="black" stroke-width="3"/>
  <line x1="300" y1="230" x2="700" y2="230" stroke="black" stroke-width="3"/>

  <text x="500" y="210" text-anchor="middle"
        font-size="28" font-family="Arial" font-weight="bold">Completar Tarea</text>

  <!-- Close icon -->
  <text x="670" y="205" font-size="20" font-family="Arial">×</text>

  <!-- Body text -->
  <text x="500" y="275" text-anchor="middle"
        font-size="18" font-family="Arial">¿Marcar esta tarea como completada?</text>
  <text x="500" y="305" text-anchor="middle"
        font-size="16" font-family="Arial">Se registrará la fecha de finalización.</text>

  <!-- Buttons -->
  <rect x="350" y="340" width="120" height="45" rx="12" ry="12"
        fill="white" stroke="black" stroke-width="3"/>
  <text x="410" y="370" text-anchor="middle"
        font-size="18" font-family="Arial">Cancelar</text>

  <rect x="500" y="340" width="170" height="45" rx="12" ry="12"
        fill="#E85C5C" stroke="black" stroke-width="3"/>
  <text x="585" y="370" text-anchor="middle"
        font-size="18" font-family="Arial" fill="white">Confirmar finalización</text>
</svg>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill:#111; }
      .title { font-size: 54px; font-weight: 700; }
      .section { font-size: 34px; font-weight: 700; }
      .label { font-size: 30px; }
      .small { font-size: 24px; }
      .outline { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke-width:2; }
      .input { fill:#fff; stroke:#111; stroke-width:3; rx:12; ry:12; }
      .btn { fill:#fff; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .btnPrimary { fill:#e35b5b; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .muted { fill:#777; }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="760" fill="white"/>
  <rect x="8" y="8" width="984" height="744" class="outline"/>

  <text x="30" y="80" class="hand section">editarMiembro()</text>

  <rect x="140.0" y="90" width="720" height="560" class="outline"/>
  <line x1="140.0" y1="180" x2="860.0" y2="180" class="outline thin"/>

  <text x="500.0" y="152" text-anchor="middle" class="hand title">Editar Miembro</text>
  <text x="830.0" y="150" text-anchor="middle" class="hand section">×</text>

  <text x="210.0" y="240" class="hand label">ID del miembro</text>
  <rect x="210.0" y="258" width="580" height="56" class="input"/>
  <text x="228.0" y="296" class="hand small muted">MBR-012</text>

  <text x="210.0" y="346" class="hand label">Nombre del miembro</text>
  <rect x="210.0" y="364" width="580" height="56" class="input"/>
  <text x="228.0" y="402" class="hand small">Juan Pérez</text>

  <text x="210.0" y="452" class="hand label">Rol / permisos</text>
  <rect x="210.0" y="470" width="580" height="56" class="input"/>
  <text x="228.0" y="508" class="hand small">Miembro</text>
  <polyline points="758.0,492 772.0,492 765.0,504 758.0,492"
            class="outline thin"/>

  <rect x="227.5" y="560" width="240" height="72" class="btn"/>
  <text x="347.5" y="608" text-anchor="middle" class="hand label">Volver atrás</text>

  <rect x="512.5" y="560" width="260" height="72" class="btnPrimary"/>
  <text x="642.5" y="608" text-anchor="middle" class="hand label" style="fill:#fff;">Guardar cambios</text>

</svg>

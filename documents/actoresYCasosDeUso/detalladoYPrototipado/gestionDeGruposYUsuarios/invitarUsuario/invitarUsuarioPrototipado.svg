<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill:#111; }
      .title { font-size: 54px; font-weight: 700; }
      .section { font-size: 34px; font-weight: 700; }
      .label { font-size: 30px; }
      .small { font-size: 24px; }
      .outline { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke-width:2; }
      .input { fill:#fff; stroke:#111; stroke-width:3; rx:12; ry:12; }
      .btn { fill:#fff; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .btnPrimary { fill:#e35b5b; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .muted { fill:#777; }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="720" fill="white"/>
  <rect x="8" y="8" width="984" height="704" class="outline"/>

  <text x="30" y="80" class="hand section">invitarUsuario()</text>

  <rect x="140.0" y="100" width="720" height="520" class="outline"/>
  <line x1="140.0" y1="190" x2="860.0" y2="190" class="outline thin"/>

  <text x="500.0" y="162" text-anchor="middle" class="hand title">Invitar Usuario</text>
  <text x="830.0" y="160" text-anchor="middle" class="hand section">×</text>

  <text x="210.0" y="260" class="hand label">Identificador (usuario / email)</text>
  <rect x="210.0" y="278" width="580" height="56" class="input"/>
  <text x="228.0" y="316" class="hand small muted">Ej: miembro@correo.com</text>

  <text x="210.0" y="378" class="hand label">Fecha límite</text>
  <rect x="210.0" y="396" width="580" height="56" class="input"/>
  <text x="228.0" y="434" class="hand small muted">DD/MM/AAAA</text>
  <rect x="732.0" y="408" width="42" height="32" class="outline thin"/>
  <line x1="732.0" y1="416" x2="774.0" y2="416" class="outline thin"/>
  <line x1="742.0" y1="408" x2="742.0" y2="402" class="outline thin"/>
  <line x1="764.0" y1="408" x2="764.0" y2="402" class="outline thin"/>

  <rect x="177.5" y="516" width="300" height="72" class="btn"/>
  <text x="327.5" y="564" text-anchor="middle" class="hand label">Cancelar invitación</text>

  <rect x="522.5" y="516" width="300" height="72" class="btnPrimary"/>
  <text x="672.5" y="564" text-anchor="middle" class="hand label" style="fill:#fff;">Enviar invitación</text>

</svg>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill:#111; }
      .title { font-size: 54px; font-weight: 700; }
      .section { font-size: 34px; font-weight: 700; }
      .label { font-size: 30px; }
      .small { font-size: 24px; }
      .outline { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke-width:2; }
      .input { fill:#fff; stroke:#111; stroke-width:3; rx:12; ry:12; }
      .btn { fill:#fff; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .btnPrimary { fill:#e35b5b; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .muted { fill:#777; }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="760" fill="white"/>
  <rect x="8" y="8" width="984" height="744" class="outline"/>

  <text x="30" y="80" class="hand section">editarInvitacion()</text>

  <rect x="140.0" y="85" width="720" height="580" class="outline"/>
  <line x1="140.0" y1="175" x2="860.0" y2="175" class="outline thin"/>

  <text x="500.0" y="147" text-anchor="middle" class="hand title">Editar Invitación</text>
  <text x="830.0" y="145" text-anchor="middle" class="hand section">×</text>

  <!-- ID invitación -->
  <text x="210.0" y="240" class="hand label">ID de la invitación</text>
  <rect x="210.0" y="258" width="580" height="56" class="input"/>
  <text x="228.0" y="296" class="hand small muted">INV-001</text>

  <!-- Estado (Aceptar/Rechazar) -->
  <text x="210.0" y="346" class="hand label">Estado (Aceptar / Rechazar)</text>
  <rect x="210.0" y="364" width="580" height="56" class="input"/>
  <text x="228.0" y="402" class="hand small">Pendiente</text>
  <!-- dropdown caret -->
  <polyline points="758.0,386 772.0,386 765.0,398 758.0,386"
            class="outline thin"/>

  <!-- Detalles (solo para visualizar datos actuales) -->
  <text x="210.0" y="459" class="hand label">Datos de la invitación</text>
  <rect x="210.0" y="477" width="580" height="120" class="input"/>
  <text x="228.0" y="515" class="hand small">Grupo: Familia</text>
  <text x="228.0" y="547" class="hand small">Enviado a: miembro@correo.com</text>
  <text x="228.0" y="579" class="hand small muted">Fecha: 18/12/2025</text>

  <!-- Buttons -->
  <rect x="237.5" y="652" width="230" height="72" class="btn"/>
  <text x="352.5" y="700" text-anchor="middle" class="hand label">Volver atrás</text>

  <rect x="512.5" y="652" width="250" height="72" class="btnPrimary"/>
  <text x="637.5" y="700" text-anchor="middle" class="hand label" style="fill:#fff;">Guardar cambios</text>

</svg>

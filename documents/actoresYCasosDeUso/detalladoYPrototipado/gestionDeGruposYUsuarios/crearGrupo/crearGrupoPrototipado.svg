<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill:#111; }
      .title { font-size: 54px; font-weight: 700; }
      .section { font-size: 34px; font-weight: 700; }
      .label { font-size: 30px; }
      .small { font-size: 24px; }
      .outline { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke-width:2; }
      .input { fill:#fff; stroke:#111; stroke-width:3; rx:12; ry:12; }
      .btn { fill:#fff; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .btnPrimary { fill:#e35b5b; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .muted { fill:#777; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1000" height="700" fill="white"/>
  <rect x="8" y="8" width="984" height="684" class="outline"/>

  <!-- function label -->
  <text x="30" y="80" class="hand section">crearGrupo()</text>

  <!-- main container -->
  <rect x="180.0" y="120" width="640" height="470" class="outline"/>
  <line x1="180.0" y1="210" x2="820.0" y2="210" class="outline thin"/>

  <!-- title -->
  <text x="500.0" y="182" text-anchor="middle" class="hand title">Crear Grupo</text>

  <!-- fields -->
  <text x="250.0" y="295" class="hand label">Nombre del grupo <tspan class="hand label" style="fill:#c62828;">*</tspan></text>
  <rect x="250.0" y="313" width="500" height="56" class="input"/>
  <text x="268.0" y="351" class="hand small muted">Ej: Familia</text>

  <text x="250.0" y="403" class="hand label">Descripción del grupo</text>
  <rect x="250.0" y="421" width="500" height="110" class="input"/>
  <text x="268.0" y="459" class="hand small muted">Opcional</text>

  <!-- buttons -->
  <rect x="240.0" y="586" width="240" height="72" class="btn"/>
  <text x="360.0" y="634" text-anchor="middle" class="hand label">Cancelar creación</text>

  <rect x="520.0" y="586" width="240" height="72" class="btnPrimary"/>
  <text x="640.0" y="634" text-anchor="middle" class="hand label" style="fill:#fff;">Crear grupo</text>

</svg>

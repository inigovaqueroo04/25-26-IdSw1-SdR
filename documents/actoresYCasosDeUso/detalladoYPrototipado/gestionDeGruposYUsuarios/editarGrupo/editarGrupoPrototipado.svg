<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill:#111; }
      .title { font-size: 54px; font-weight: 700; }
      .section { font-size: 34px; font-weight: 700; }
      .label { font-size: 30px; }
      .small { font-size: 24px; }
      .outline { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke-width:2; }
      .input { fill:#fff; stroke:#111; stroke-width:3; rx:12; ry:12; }
      .btn { fill:#fff; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .btnPrimary { fill:#e35b5b; stroke:#111; stroke-width:3; rx:18; ry:18; }
      .muted { fill:#777; }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="760" fill="white"/>
  <rect x="8" y="8" width="984" height="744" class="outline"/>

  <text x="30" y="80" class="hand section">editarGrupo()</text>

  <rect x="140.0" y="85" width="720" height="580" class="outline"/>
  <line x1="140.0" y1="175" x2="860.0" y2="175" class="outline thin"/>

  <text x="500.0" y="147" text-anchor="middle" class="hand title">Editar Grupo</text>
  <text x="830.0" y="145" text-anchor="middle" class="hand section">×</text>

  <text x="210.0" y="240" class="hand label">Código del grupo</text>
  <rect x="210.0" y="258" width="580" height="56" class="input"/>
  <text x="228.0" y="296" class="hand small muted">FAM-001</text>

  <text x="210.0" y="346" class="hand label">Editar nombre</text>
  <rect x="210.0" y="364" width="580" height="56" class="input"/>
  <text x="228.0" y="402" class="hand small">Familia</text>

  <text x="210.0" y="452" class="hand label">Editar descripción</text>
  <rect x="210.0" y="470" width="580" height="120" class="input"/>
  <text x="228.0" y="508" class="hand small">Tareas y recordatorios del hogar</text>

  <rect x="237.5" y="635" width="230" height="72" class="btn"/>
  <text x="352.5" y="683" text-anchor="middle" class="hand label">Volver atrás</text>

  <rect x="512.5" y="635" width="250" height="72" class="btnPrimary"/>
  <text x="637.5" y="683" text-anchor="middle" class="hand label" style="fill:#fff;">Guardar cambios</text>

</svg>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <rect x="0" y="0" width="1000" height="700" fill="#ffffff"/>

  <!-- Outer frame -->
  <rect x="18" y="18" width="964" height="664"
        rx="14" ry="14" fill="#ffffff" stroke="#000000" stroke-width="4"/>

  <!-- Screen label -->
  <text x="38" y="70"
        font-family="Comic Sans MS, Comic Sans, cursive" font-size="36" fill="#000000">eliminarMiembro()</text>

  <!-- Modal -->
  <rect x="220" y="205" width="560" height="310"
        rx="14" ry="14" fill="#ffffff" stroke="#000000" stroke-width="4"/>

  <!-- Modal header -->
  <rect x="220" y="205" width="560" height="72"
        rx="14" ry="14" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <rect x="222" y="263" width="556" height="20" fill="#ffffff"/>
  <line x1="220" y1="277" x2="780" y2="277"
        stroke="#000000" stroke-width="3"/>

  <text x="500.0" y="255"
        font-family="Comic Sans MS, Comic Sans, cursive" font-size="44" fill="#000000"
        text-anchor="middle">Eliminar Miembro</text>

  <!-- Close icon -->
  <text x="750" y="255"
        font-family="Comic Sans MS, Comic Sans, cursive" font-size="30" fill="#000000"
        text-anchor="middle">×</text>

  <!-- Body text -->
  <text x="500.0" y="359"
        font-family="Comic Sans MS, Comic Sans, cursive" font-size="24" fill="#000000"
        text-anchor="middle">¿Seguro que deseas eliminar este miembro?</text>

  <text x="500.0" y="397"
        font-family="Comic Sans MS, Comic Sans, cursive" font-size="22" fill="#000000"
        text-anchor="middle">Esta acción no se puede deshacer.</text>

  <!-- Buttons -->
  <rect x="246" y="435" width="180" height="54"
        rx="16" ry="16" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <text x="336.0" y="471"
        font-family="Comic Sans MS, Comic Sans, cursive" font-size="24" fill="#000000"
        text-anchor="middle">Cancelar</text>

  <rect x="494" y="435" width="260" height="54"
        rx="16" ry="16" fill="#e85b5b" stroke="#000000" stroke-width="4"/>
  <text x="624.0" y="471"
        font-family="Comic Sans MS, Comic Sans, cursive" font-size="22" fill="#ffffff"
        text-anchor="middle">Confirmar eliminación</text>
</svg>

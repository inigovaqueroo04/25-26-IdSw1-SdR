<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill: #111; }
      .title { font-size: 54px; font-weight: 700; }
      .section { font-size: 30px; font-weight: 600; }
      .label { font-size: 26px; }
      .outline { fill: none; stroke: #111; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 2; }
      .btn { fill: #fff; stroke: #111; stroke-width: 3; rx: 18; ry: 18; }
      .btnPrimary { fill: #e35b5b; stroke: #111; stroke-width: 3; rx: 18; ry: 18; }
      .search { fill:#fff; stroke:#111; stroke-width:3; rx:14; ry:14; }
      .muted { fill:#777; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1120" height="720" fill="white"/>
  <rect x="8" y="8" width="1104" height="704" class="outline"/>

  <!-- function -->
  <text x="30" y="70" class="hand section">abrirInvitaciones()</text>

  <!-- title -->
  <text x="560.0" y="145" text-anchor="middle" class="hand title">Gestión de Invitaciones</text>

  <!-- search / filter -->
  <rect x="340.0" y="205" width="440" height="54" class="search"/>
  <text x="370.0" y="242" class="hand label muted">Buscar...</text>

  <!-- headers -->
  <line x1="140" y1="315" x2="980" y2="315" class="outline thin"/>
  <text x="160" y="295" class="hand section">ID Invitación</text>
  <text x="400" y="295" class="hand section">Estado</text>
  <text x="700" y="295" class="hand section">Acciones</text>

  <!-- row 1 -->
  <text x="160" y="365" class="hand label">INV-001</text>
  <text x="400" y="365" class="hand label">Pendiente</text>
  <text x="700" y="365" class="hand label">Editar</text>

  <!-- row 2 -->
  <text x="160" y="420" class="hand label">INV-002</text>
  <text x="400" y="420" class="hand label">Aceptada</text>
  <text x="700" y="420" class="hand label">Editar</text>

  <!-- row 3 -->
  <text x="160" y="475" class="hand label">INV-003</text>
  <text x="400" y="475" class="hand label">Rechazada</text>
  <text x="700" y="475" class="hand label">Editar</text>

  <!-- footer buttons -->
  <rect x="140" y="555" width="260" height="72" class="btnPrimary"/>
  <text x="270" y="602" text-anchor="middle" class="hand label" style="fill:#fff;">Completar gestión</text>

</svg>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill: #111; }
      .title { font-size: 52px; font-weight: 700; }
      .section { font-size: 30px; font-weight: 600; }
      .label { font-size: 26px; }
      .outline { fill: none; stroke: #111; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 2; }
      .btn { fill: #fff; stroke: #111; stroke-width: 3; rx: 18; ry: 18; }
      .search { fill:#fff; stroke:#111; stroke-width:3; rx:14; ry:14; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1100" height="700" fill="white"/>

  <!-- canvas -->
  <rect x="8" y="8" width="1084" height="684" class="outline"/>

  <!-- function -->
  <text x="30" y="70" class="hand section">abrirGrupos()</text>

  <!-- title -->
  <text x="550.0" y="140" text-anchor="middle" class="hand title">Gestión de Grupos</text>

  <!-- search (more spacing from title) -->
  <rect x="350.0" y="185" width="400" height="52" class="search"/>
  <text x="375.0" y="220" class="hand label" style="fill:#777;">Buscar...</text>

  <!-- headers (pushed down and wider right margin) -->
  <line x1="140" y1="285" x2="960" y2="285" class="outline thin"/>
  <text x="160" y="265" class="hand section">ID</text>
  <text x="360" y="265" class="hand section">Nombre del Grupo</text>
  <text x="740" y="265" class="hand section">Acciones</text>

  <!-- row 1 -->
  <text x="160" y="335" class="hand label">FAM-001</text>
  <text x="360" y="335" class="hand label">Familia</text>
  <text x="740" y="335" class="hand label">Editar | Eliminar | Unirse</text>

  <!-- row 2 -->
  <text x="160" y="385" class="hand label">WRK-205</text>
  <text x="360" y="385" class="hand label">Equipo de Diseño</text>
  <text x="740" y="385" class="hand label">Editar | Eliminar | Unirse</text>

  <!-- row 3 -->
  <text x="160" y="435" class="hand label">SOC-099</text>
  <text x="360" y="435" class="hand label">Club de Senderismo</text>
  <text x="740" y="435" class="hand label">Editar | Eliminar | Unirse</text>

  <!-- footer buttons -->
  <rect x="160" y="540" width="200" height="70" class="btn"/>
  <text x="260" y="585" text-anchor="middle" class="hand label">Volver</text>

  <rect x="740" y="540" width="260" height="70" class="btn"/>
  <text x="870" y="585" text-anchor="middle" class="hand label">Crear nuevo grupo</text>

</svg>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill: #111; }
      .title { font-size: 54px; font-weight: 700; }
      .section { font-size: 30px; font-weight: 600; }
      .label { font-size: 26px; }
      .outline { fill: none; stroke: #111; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 2; }
      .btn { fill: #fff; stroke: #111; stroke-width: 3; rx: 18; ry: 18; }
      .btnPrimary { fill: #e35b5b; stroke: #111; stroke-width: 3; rx: 18; ry: 18; }
      .search { fill:#fff; stroke:#111; stroke-width:3; rx:14; ry:14; }
      .muted { fill:#777; }
    </style>
  </defs>

  <rect x="0" y="0" width="1120" height="720" fill="white"/>
  <rect x="8" y="8" width="1104" height="704" class="outline"/>

  <text x="30" y="70" class="hand section">abrirGrupos()</text>

  <text x="560.0" y="145" text-anchor="middle" class="hand title">Gestión de Grupos</text>

  <!-- search / filter -->
  <rect x="340.0" y="205" width="440" height="54" class="search"/>
  <text x="370.0" y="242" class="hand label muted">Buscar...</text>

  <!-- headers -->
  <line x1="140" y1="315" x2="980" y2="315" class="outline thin"/>
  <text x="160" y="295" class="hand section">ID</text>
  <text x="380" y="295" class="hand section">Nombre del Grupo</text>
  <text x="690" y="295" class="hand section">Acciones</text>

  <!-- row 1 -->
  <text x="160" y="365" class="hand label">FAM-001</text>
  <text x="380" y="365" class="hand label">Familia</text>
  
    <g transform="translate(690,335)">
      <rect x="0" y="10" width="34" height="8" class="outline thin" transform="rotate(-20 0 10)"/>
      <polygon points="32,6 44,10 34,16" class="outline thin" />
    </g>
    
  <text x="745" y="365" class="hand label">Editar</text>
  
    <g transform="translate(855,331)">
      <rect x="4" y="10" width="22" height="26" class="outline thin"/>
      <rect x="2" y="6" width="26" height="6" class="outline thin"/>
      <line x1="10" y1="14" x2="10" y2="34" class="outline thin"/>
      <line x1="16" y1="14" x2="16" y2="34" class="outline thin"/>
      <line x1="22" y1="14" x2="22" y2="34" class="outline thin"/>
    </g>
    
  <text x="905" y="365" class="hand label">Eliminar</text>

  <!-- row 2 -->
  <text x="160" y="420" class="hand label">WRK-205</text>
  <text x="380" y="420" class="hand label">Equipo de Diseño</text>
  
    <g transform="translate(690,390)">
      <rect x="0" y="10" width="34" height="8" class="outline thin" transform="rotate(-20 0 10)"/>
      <polygon points="32,6 44,10 34,16" class="outline thin" />
    </g>
    
  <text x="745" y="420" class="hand label">Editar</text>
  
    <g transform="translate(855,386)">
      <rect x="4" y="10" width="22" height="26" class="outline thin"/>
      <rect x="2" y="6" width="26" height="6" class="outline thin"/>
      <line x1="10" y1="14" x2="10" y2="34" class="outline thin"/>
      <line x1="16" y1="14" x2="16" y2="34" class="outline thin"/>
      <line x1="22" y1="14" x2="22" y2="34" class="outline thin"/>
    </g>
    
  <text x="905" y="420" class="hand label">Eliminar</text>

  <!-- row 3 -->
  <text x="160" y="475" class="hand label">SOC-099</text>
  <text x="380" y="475" class="hand label">Club de Senderismo</text>
  
    <g transform="translate(690,445)">
      <rect x="0" y="10" width="34" height="8" class="outline thin" transform="rotate(-20 0 10)"/>
      <polygon points="32,6 44,10 34,16" class="outline thin" />
    </g>
    
  <text x="745" y="475" class="hand label">Editar</text>
  
    <g transform="translate(855,441)">
      <rect x="4" y="10" width="22" height="26" class="outline thin"/>
      <rect x="2" y="6" width="26" height="6" class="outline thin"/>
      <line x1="10" y1="14" x2="10" y2="34" class="outline thin"/>
      <line x1="16" y1="14" x2="16" y2="34" class="outline thin"/>
      <line x1="22" y1="14" x2="22" y2="34" class="outline thin"/>
    </g>
    
  <text x="905" y="475" class="hand label">Eliminar</text>

  <!-- footer buttons -->
  <rect x="680" y="555" width="300" height="72" class="btn"/>
  <text x="830" y="602" text-anchor="middle" class="hand label">Crear nuevo grupo</text>

  <rect x="140" y="555" width="210" height="72" class="btn"/>
  <text x="245" y="602" text-anchor="middle" class="hand label">Actualizar</text>

  <rect x="380" y="555" width="280" height="72" class="btnPrimary"/>
  <text x="520" y="602" text-anchor="middle" class="hand label" style="fill:#fff;">Completar gestión</text>

</svg>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="650" viewBox="0 0 1000 650">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill: #111; }
      .title { font-size: 52px; font-weight: 600; }
      .section { font-size: 34px; font-weight: 600; }
      .label { font-size: 30px; }
      .outline { fill: none; stroke: #111; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 2; }
      .card { fill: #fff; stroke: #111; stroke-width: 3; rx: 18; ry: 18; }
    </style>
  </defs>

  <!-- fixed white background -->
  <rect x="0" y="0" width="1000" height="650" fill="white"/>

  <!-- outer canvas -->
  <rect x="8" y="8" width="984" height="634" class="outline" />

  <!-- function label -->
  <text x="30" y="80" class="hand section">completarGestion()</text>

  <!-- main title -->
  <text x="500.0" y="170" text-anchor="middle" class="hand title">Pantalla Principal</text>

  <!-- cards -->
  <rect x="150" y="230" width="220" height="180" class="card"/>
  <text x="260" y="360" text-anchor="middle" class="hand section">Tareas</text>

  <rect x="390" y="230" width="220" height="180" class="card"/>
  <text x="500" y="360" text-anchor="middle" class="hand section">Grupos</text>

  <rect x="630" y="230" width="220" height="180" class="card"/>
  <text x="740" y="360" text-anchor="middle" class="hand section">Planificación</text>

  <!-- success message -->
  <circle cx="340.0" cy="480" r="26" class="outline"/>
  <text x="340.0" y="490" text-anchor="middle" class="hand section" style="fill:#2e7d32;">✓</text>

  <text x="380.0" y="490" class="hand label" style="fill:#2e7d32;">
    Gestión completada exitosamente.
  </text>

</svg>

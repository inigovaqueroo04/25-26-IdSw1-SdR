<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650">
  <defs>
    <style>
      .hand { font-family: "Comic Sans MS", "Segoe UI", "Arial", sans-serif; fill: #111; }
      .title { font-size: 52px; font-weight: 600; }
      .small { font-size: 30px; }
      .label { font-size: 34px; font-weight: 600; }
      .outline { fill: none; stroke: #111; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 2; }
      .btn { fill: #fff; stroke: #111; stroke-width: 3; rx: 16; ry: 16; }
      .btnRed { fill: #e35b5b; stroke: #111; stroke-width: 3; rx: 16; ry: 16; }
    </style>
  </defs>

  <!-- fixed white background -->
  <rect x="0" y="0" width="900" height="650" fill="white"/>

  <!-- outer canvas -->
  <rect x="8" y="8" width="884" height="634" class="outline" />

  <!-- function label -->
  <text x="30" y="80" class="hand label">cerrarSesion()</text>

  <!-- modal -->
  <rect x="150" y="120" width="600" height="400" class="outline" />
  <line x1="150" y1="205" x2="750" y2="205" class="outline thin"/>

  <!-- title -->
  <text x="450.0" y="178" text-anchor="middle" class="hand title">Cerrar Sesión</text>

  <!-- close X -->
  <text x="720" y="175" text-anchor="middle" class="hand label">×</text>

  <!-- warning icon -->
  <circle cx="235" cy="275" r="32" class="outline"/>
  <text x="235" y="287" text-anchor="middle" class="hand label" style="fill:#c62828;">!</text>

  <!-- question (wrapped) -->
  <text x="290" y="270" class="hand small">
    <tspan x="290" dy="0">¿Seguro que deseas cerrar</tspan>
    <tspan x="290" dy="38">la sesión?</tspan>
  </text>

  <!-- buttons -->
  <rect x="235" y="415" width="190" height="78" class="btn"/>
  <text x="330" y="465" text-anchor="middle" class="hand small">Cancelar</text>

  <rect x="475" y="415" width="210" height="78" class="btnRed"/>
  <text x="580" y="465" text-anchor="middle" class="hand small" style="fill:#fff;">Confirmar</text>
</svg>

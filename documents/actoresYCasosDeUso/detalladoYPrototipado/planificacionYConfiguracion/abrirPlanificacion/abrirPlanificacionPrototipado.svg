<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="650" viewBox="0 0 900 650"
     xmlns="http://www.w3.org/2000/svg">

  <!-- White background -->
  <rect x="0" y="0" width="100%" height="100%" fill="white"/>

  <!-- Outer container -->
  <rect x="20" y="20" rx="20" ry="20" width="860" height="610"
        fill="white" stroke="black" stroke-width="4"/>

  <!-- Function title -->
  <text x="40" y="55" font-family="Comic Sans MS" font-size="26">abrirPlanificacion()</text>

  <!-- Modal -->
  <rect x="170" y="90" rx="20" ry="20" width="560" height="480"
        fill="white" stroke="black" stroke-width="4"/>

  <!-- Modal header -->
  <rect x="170" y="90" rx="20" ry="20" width="560" height="80"
        fill="white" stroke="black" stroke-width="4"/>
  <text x="450" y="145" text-anchor="middle"
        font-family="Comic Sans MS" font-size="40" font-weight="bold">
    Planificación
  </text>
  <text x="700" y="135" font-family="Comic Sans MS" font-size="28">×</text>

  <!-- Section: tareas -->
  <text x="210" y="200" font-family="Comic Sans MS" font-size="26">Tareas vinculables</text>

  <rect x="210" y="215" rx="12" ry="12" width="480" height="140"
        fill="white" stroke="black" stroke-width="3"/>

  <rect x="230" y="235" rx="10" ry="10" width="420" height="40"
        fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="262" font-family="Comic Sans MS" font-size="20">
    T-001 · Comprar comida
  </text>

  <rect x="230" y="285" rx="10" ry="10" width="420" height="40"
        fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="312" font-family="Comic Sans MS" font-size="20">
    T-002 · Llevar coche al taller
  </text>

  <!-- Scroll bar -->
  <rect x="660" y="235" rx="6" ry="6" width="12" height="120"
        fill="white" stroke="black" stroke-width="2"/>
  <rect x="660" y="265" rx="6" ry="6" width="12" height="40"
        fill="white" stroke="black" stroke-width="2"/>

  <!-- Section: horario -->
  <text x="210" y="385" font-family="Comic Sans MS" font-size="24">Horario configurado</text>
  <rect x="210" y="400" rx="12" ry="12" width="480" height="40"
        fill="white" stroke="black" stroke-width="2"/>
  <text x="230" y="427" font-family="Comic Sans MS" font-size="18">
    Ej: Lun–Vie 18:00–20:00
  </text>

  <!-- Section: recordatorios -->
  <text x="210" y="465" font-family="Comic Sans MS" font-size="24">Recordatorios</text>
  <rect x="210" y="480" rx="12" ry="12" width="230" height="40"
        fill="white" stroke="black" stroke-width="2"/>
  <text x="225" y="507" font-family="Comic Sans MS" font-size="18">
    Ej: 1h antes (notif.)
  </text>

  <!-- Section: localizacion -->
  <text x="460" y="465" font-family="Comic Sans MS" font-size="24">Localización</text>
  <rect x="460" y="480" rx="12" ry="12" width="230" height="40"
        fill="white" stroke="black" stroke-width="2"/>
  <text x="475" y="507" font-family="Comic Sans MS" font-size="18">
    Ej: Casa / Supermercado
  </text>

  <!-- Buttons -->
  <rect x="240" y="545" rx="20" ry="20" width="180" height="50"
        fill="white" stroke="black" stroke-width="3"/>
  <text x="330" y="578" text-anchor="middle"
        font-family="Comic Sans MS" font-size="22">Volver</text>

  <rect x="460" y="545" rx="20" ry="20" width="260" height="50"
        fill="#e85b5b" stroke="black" stroke-width="3"/>
  <text x="590" y="578" text-anchor="middle"
        font-family="Comic Sans MS" font-size="22" fill="white">
    Editar planificación
  </text>

</svg>


<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
  <style>
    .frame { fill: white; stroke: black; stroke-width: 3; }
    .inner { fill: white; stroke: black; stroke-width: 2; }
    .title { font-family: 'Comic Sans MS', 'Comic Sans', cursive; font-size: 36px; font-weight: bold; }
    .label { font-family: 'Comic Sans MS', 'Comic Sans', cursive; font-size: 20px; font-weight: bold; }
    .text { font-family: 'Comic Sans MS', 'Comic Sans', cursive; font-size: 18px; }
    .placeholder { fill: none; stroke: black; stroke-width: 2; rx: 12; ry: 12; }
    .button { fill: none; stroke: black; stroke-width: 2; rx: 18; ry: 18; }
    .button-primary { fill: #e85b56; stroke: black; stroke-width: 2; rx: 18; ry: 18; }
    .button-text { font-family: 'Comic Sans MS', 'Comic Sans', cursive; font-size: 18px; font-weight: bold; }
    .small { font-size: 16px; fill: #555; }
  </style>

  <!-- Outer frame -->
  <rect x="10" y="10" width="880" height="600" rx="20" ry="20" class="frame"/>
  <text x="30" y="45" class="label">abrirPlanificacion()</text>

  <!-- Modal -->
  <rect x="150" y="80" width="600" height="480" rx="20" ry="20" class="inner"/>

  <!-- Header -->
  <line x1="150" y1="140" x2="750" y2="140" stroke="black" stroke-width="2"/>
  <text x="300" y="125" class="title">Planificación</text>
  <text x="715" y="120" class="label">×</text>

  <!-- Tareas vinculables -->
  <text x="180" y="175" class="label">Tareas vinculables</text>
  <rect x="180" y="190" width="470" height="120" class="placeholder"/>
  
  <rect x="200" y="205" width="400" height="36" class="placeholder"/>
  <text x="215" y="230" class="text">T-001 · Comprar comida</text>

  <rect x="200" y="250" width="400" height="36" class="placeholder"/>
  <text x="215" y="275" class="text">T-002 · Llevar coche al taller</text>

  <!-- Scroll bar -->
  <rect x="610" y="205" width="18" height="86" rx="8" ry="8" fill="none" stroke="black" stroke-width="2"/>
  <rect x="612" y="235" width="14" height="30" rx="6" ry="6" fill="none" stroke="black" stroke-width="2"/>

  <!-- Horario -->
  <text x="180" y="340" class="label">Horario configurado</text>
  <rect x="180" y="355" width="470" height="40" class="placeholder"/>
  <text x="195" y="382" class="small">Ej: Lun–Vie 18:00–20:00</text>

  <!-- Recordatorios -->
  <text x="180" y="420" class="label">Recordatorios</text>
  <rect x="180" y="435" width="220" height="40" class="placeholder"/>
  <text x="195" y="462" class="small">Ej: 1h antes (notif.)</text>

  <!-- Localización -->
  <text x="430" y="420" class="label">Localización</text>
  <rect x="430" y="435" width="220" height="40" class="placeholder"/>
  <text x="445" y="462" class="small">Ej: Casa / Supermercado</text>

  <!-- Buttons -->
  <rect x="200" y="500" width="160" height="44" class="button"/>
  <text x="245" y="530" class="button-text">Volver</text>

  <rect x="430" y="500" width="220" height="44" class="button-primary"/>
  <text x="455" y="530" class="button-text" fill="white">Editar planificación</text>
</svg>
